<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tianbo Pan | Project Pages</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --border: rgba(148, 163, 184, 0.2);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 20px 72px;
    }
    h1 { margin-bottom: 0.4rem; }
    p { color: var(--muted); line-height: 1.7; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 28px;
    }
    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
    }
    .card:hover {
      transform: translateY(-2px);
      transition: 0.2s ease;
    }
    .tag {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <h1>Tianbo Pan</h1>
    <p>Project pages hosted under GitHub Pages. Add more project folders here later, and link them from this homepage.</p>

    <div class="grid">
      <a class="card" href="./vgt-w/">
        <span class="tag">Project Page</span>
        <h2>VGT-W</h2>
        <p>Visual Geometry Transformer in the Wild: Distractor-Free 3D Reconstruction.</p>
      </a>
    </div>
  </main>
</body>
</html>
